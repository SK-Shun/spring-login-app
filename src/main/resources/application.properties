# ===== 共通設定 =====
spring.application.name=Login

# アクティブなプロファイルは環境変数で切り替える
# 開発時: SPRING_PROFILES_ACTIVE=dev
# 本番時: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Flyway（共通）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JPA（共通）
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# ===== 本番環境 =====
# 機密情報はすべて環境変数から取得（直書き禁止）

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# コネクションプール（HikariCP）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}

# Actuator（本番では最小限のみ公開）
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ログ
logging.level.com.example.demo=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
logging.file.name=/var/log/login-app/application.log

# Actuator Basic認証ユーザー（本番では環境変数から取得）
# Actuator Basic認証（本番は環境変数から取得・未設定時はダミー値）
actuator.username=${ACTUATOR_USERNAME:dummy}
actuator.password=${ACTUATOR_PASSWORD:dummy}

spring.h2.console.settings.web-allow-others=false
spring.mvc.pathmatch.use-suffix-pattern=false